/* ═══════════════════════════════════════════════════════════════
   HELPER FUNCTIONS
   ═══════════════════════════════════════════════════════════════ */
const fmtK = (v, dec = 0) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  const abs = Math.abs(v);
  const s = dec > 0 ? abs.toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec })
    : abs >= 10 ? abs.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })
    : abs.toFixed(1);
  return v < 0 ? `(${s})` : s;
};
const fmtPct = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  const s = Math.abs(v).toFixed(1) + "%";
  return v < 0 ? `(${s})` : s;
};
const fmtTons = (v) => {
  if (!v || !isFinite(v)) return "—";
  return Math.abs(v).toLocaleString("en-US");
};
const delta = (curr, prev) => {
  if (!prev || !curr || !isFinite(curr) || !isFinite(prev) || Math.abs(prev) < 0.01) return null;
  // When signs differ, % change is misleading — return null so UI shows absolute delta instead
  if ((curr > 0 && prev < 0) || (curr < 0 && prev > 0)) return null;
  return ((curr - prev) / Math.abs(prev)) * 100;
};
// Absolute delta for when % is misleading (sign changes)
const deltaAbs = (curr, prev) => {
  if (curr === null || curr === undefined || prev === null || prev === undefined) return null;
  return curr - prev;
};
const sumYTD = (arr, n = 3) => arr.slice(0, n).reduce((a, b) => a + b, 0);
const clr = (v) => v > 0.01 ? C.green : v < -0.01 ? C.red : C.textMuted;
const clrBg = (v) => v > 0.01 ? C.greenBg : v < -0.01 ? C.redBg : "transparent";

/* ═══════════════════════════════════════════════════════════════
   SHARED COMPONENTS
   ═══════════════════════════════════════════════════════════════ */
const Arrow = ({ val, suffix = "%" }) => {
  if (val === null || val === undefined || !isFinite(val)) return <span style={{ color: C.textDim }}>—</span>;
  const up = val >= 0;
  return (
    <span style={{ ...TNUM, color: up ? C.green : C.red, fontSize: 12, fontWeight: 500 }}>
      {up ? "▲" : "▼"} {Math.abs(val).toFixed(1)}{suffix}
    </span>
  );
};

const KPICard = ({ label, value, sub, deltaVal, deltaAbsVal, color, prefix = "", suffix = "" }) => (
  <div style={{
    background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px",
    display: "flex", flexDirection: "column", gap: 4, minWidth: 0,
  }}>
    <div style={{ fontSize: 11, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 500 }}>{label}</div>
    <div style={{ ...TNUM, fontSize: 26, fontWeight: 700, color: color || C.text, lineHeight: 1.1 }}>
      {prefix}{value}{suffix}
    </div>
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 2 }}>
      {deltaVal !== undefined && deltaVal !== null && <Arrow val={deltaVal} />}
      {deltaVal === null && deltaAbsVal !== undefined && deltaAbsVal !== null && (
        <span style={{ ...TNUM, color: deltaAbsVal >= 0 ? C.green : C.red, fontSize: 12, fontWeight: 500 }}>
          {deltaAbsVal >= 0 ? "▲" : "▼"} {fmtK(Math.abs(deltaAbsVal))}
        </span>
      )}
      {sub && <span style={{ fontSize: 11, color: C.textDim }}>{sub}</span>}
    </div>
  </div>
);

const ChartTooltip = ({ active, payload, label, formatter }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 14px", ...FONT }}>
      <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>{label}</div>

          <span style={{ ...TNUM, color: C.text, fontWeight: 600 }}>
            {formatter ? formatter(p.value, p.name) : fmtK(p.value)}

};

                const isPpto = r.precio === 890;
                return (
                  <tr key={i} style={{ borderBottom: `1px solid ${C.borderLight}`, background: isReal ? C.greenBg : isPpto ? C.redBg : "transparent" }}>
                    <td style={{ padding: "6px 10px", fontSize: 12, color: isReal ? C.green : isPpto ? C.red : C.textMuted, fontWeight: isReal || isPpto ? 600 : 400 }}>
                      ${r.precio} {isReal ? "(Real)" : isPpto ? "(Ppto)" : r.precio === 907 ? "(Mínimo BE)" : ""}
                    </td>
                    <td style={{ ...TNUM, padding: "6px 10px", fontSize: 12, color: C.text, textAlign: "right" }}>{r.tonsK >= 100 ? ">100K" : `${r.tonsK.toFixed(1)}K`}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Insight Text */}
        <div style={{ ...CARD_S, borderLeft: `3px solid ${C.accent}`, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <SectionTitle>Insight Clave</SectionTitle>
          <div style={{ fontSize: 13, color: C.text, lineHeight: 1.8 }}>
            El negocio depende completamente del precio del ácido bórico. A precio presupuesto (<strong style={{ color: C.red }}>$890/ton</strong>), el volumen presupuestado <strong style={{ color: C.red }}>no cubre costos fijos</strong>.
          </div>
          <div style={{ fontSize: 13, color: C.text, lineHeight: 1.8, marginTop: 8 }}>
            La rentabilidad actual se sostiene por un precio real <strong style={{ color: C.green }}>57% superior</strong> al presupuesto. Si el precio cae bajo <strong style={{ color: C.accent }}>$907/ton</strong>, la empresa vuelve a pérdida.
          </div>
        </div>
      </div>
    </div>
  );
};
